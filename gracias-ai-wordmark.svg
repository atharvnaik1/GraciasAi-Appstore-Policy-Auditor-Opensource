<!-- Logo with Wordmark for Gracias AI -->
<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Logo Mark (Shield) -->
  <g transform="translate(20, 20)">
    <path d="M 80 0 
             L 140 24 
             Q 146 56 132 104 
             Q 116 140 80 152 
             Q 44 140 28 104 
             Q 14 56 20 24 
             L 80 0 Z" 
          fill="url(#brandGradient)" 
          stroke="url(#brandGradient)" 
          stroke-width="3"
          filter="url(#glow)"/>
    
    <!-- Apple + AI Chip -->
    <g transform="translate(52, 48)">
      <path d="M 16 0 
               Q 26 -3 30 5 
               Q 40 3 42 13 
               Q 46 33 34 53 
               Q 20 67 16 67 
               Q 12 67 0 53 
               Q -12 33 -8 13 
               Q -6 3 4 5 
               Q 6 -3 16 0 Z" 
            fill="white" 
            opacity="0.95"/>
      
      <path d="M 16 0 
               Q 21 -1 23 -7 
               Q 24 -12 20 -15 
               Q 16 -12 16 0 Z" 
            fill="white" 
            opacity="0.95"/>
      
      <rect x="8" y="20" width="16" height="16" rx="1.5" stroke="#a855f7" stroke-width="1" fill="none" opacity="0.6"/>
      <line x1="16" y1="20" x2="16" y2="13" stroke="#a855f7" stroke-width="1" opacity="0.6"/>
      <line x1="16" y1="36" x2="16" y2="43" stroke="#a855f7" stroke-width="1" opacity="0.6"/>
      <line x1="8" y1="28" x2="1" y2="28" stroke="#a855f7" stroke-width="1" opacity="0.6"/>
      <line x1="24" y1="28" x2="31" y2="28" stroke="#a855f7" stroke-width="1" opacity="0.6"/>
      <circle cx="16" cy="13" r="1.5" fill="#a855f7" opacity="0.6"/>
      <circle cx="16" cy="43" r="1.5" fill="#a855f7" opacity="0.6"/>
      <circle cx="1" cy="28" r="1.5" fill="#a855f7" opacity="0.6"/>
      <circle cx="31" cy="28" r="1.5" fill="#a855f7" opacity="0.6"/>
    </g>
  </g>
  
  <!-- Wordmark: Gracias AI -->
  <text x="200" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="url(#brandGradient)">
    Gracias AI
  </text>
  
  <!-- Tagline -->
  <text x="200" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#6b7280" letter-spacing="0.5">
    iOS App Store Compliance Auditor
  </text>
</svg>