name: Build and deploy Node.js app to Azure Web App - ipaship1

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Upload production build
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            .next/standalone
            .next/static
            public
            package.json

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_03484BCC7B2349F5A109A2D6A4658641 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_616D1130410543E5A1F8BEE0ABDC4552 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_FD3DE9ACEBAF4DB1952520E866B84516 }}

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'ipaship1'
          slot-name: 'Production'
          package: .
