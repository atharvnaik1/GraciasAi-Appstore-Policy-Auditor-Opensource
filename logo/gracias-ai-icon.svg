<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield Background -->
  <path d="M100 20 L160 40 L160 100 C160 140 100 180 100 180 C100 180 40 140 40 100 L40 40 Z" 
        fill="url(#gradient)" opacity="0.1" stroke="url(#gradient)" stroke-width="2"/>
  
  <!-- AI Brain / Circuit -->
  <circle cx="100" cy="80" r="24" fill="none" stroke="url(#gradient)" stroke-width="2"/>
  
  <!-- Neural Network Nodes -->
  <circle cx="100" cy="56" r="3" fill="#a855f7"/>
  <circle cx="116" cy="72" r="2.5" fill="#3b82f6"/>
  <circle cx="84" cy="72" r="2.5" fill="#3b82f6"/>
  <circle cx="100" cy="88" r="4" fill="url(#gradient)"/>
  
  <!-- Connection Lines -->
  <line x1="100" y1="56" x2="116" y2="72" stroke="#a855f7" stroke-width="1" opacity="0.6"/>
  <line x1="100" y1="56" x2="84" y2="72" stroke="#a855f7" stroke-width="1" opacity="0.6"/>
  <line x1="84" y1="72" x2="100" y2="88" stroke="#3b82f6" stroke-width="1" opacity="0.6"/>
  <line x1="116" y1="72" x2="100" y2="88" stroke="#3b82f6" stroke-width="1" opacity="0.6"/>
  
  <!-- Checkmark (Compliance) -->
  <path d="M92 110 L98 118 L108 104" fill="none" stroke="url(#gradient)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
